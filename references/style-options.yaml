version: 1
default_option: auto-hybrid

options:
  - id: auto-hybrid
    label: 自动混合
    type: default
    use_when:
      - 用户没有明确指定风格
      - 希望自动在电影感、编辑感和工程秩序之间找到主次
    rules:
      - 必须先确定一个主方向，再允许少量辅方向
      - 不允许把所有 option 平均混在一起
      - 除非任务明显要求互动式 visual essay 或可玩数据叙事，否则不要默认混入 playful-data-essay

  - id: cinematic-narrative
    label: 电影叙事
    sources:
      - OceanX
    use_when:
      - 需要沉浸式主视觉
      - 页面靠场景、环境、任务现场建立世界观
    avoid:
      - 廉价未来风
      - 过度发光边框

  - id: editorial-museum
    label: 编辑博物馆
    sources:
      - Brooklyn Museum
      - Apple Environment
      - MoMA
      - Fondation Cartier
    use_when:
      - 需要图录感、策展感、长阅读稳定性
      - 需要明亮、克制、证据导向的公共事务型科学内容页
      - 需要馆藏标签、楼层/展厅信息、作者/年份/材质等机构化元信息
      - 需要更品牌化、更海报化的文化机构首页，但内容页仍保持机构化阅读秩序
      - 更重视排版节奏与安静高级感
    avoid:
      - 过度留白导致信息失重
      - 空洞的“高冷感”

  - id: mission-data
    label: 任务数据
    sources:
      - NASA JPL
      - Apple Environment
    use_when:
      - 需要任务简报、研究报告、工程可信度
      - 有较多元信息、术语、参数和数据容器
      - 需要把方法论、脚注和证据链纳入主叙事
    avoid:
      - SaaS dashboard 感
      - 营销徽章堆叠

  - id: image-led-premium
    label: 图像主导高级感
    sources:
      - MasterClass
    use_when:
      - 高质量人物或主题摄影承担主叙事
      - 需要海报感、详情页质感和克制的转化
    avoid:
      - 普通课程售卖页
      - 只有封面页高级

  - id: playful-data-essay
    label: 可玩数据随笔
    sources:
      - The Pudding
    use_when:
      - 需要 explorable explanation 或互动式 visual essay
      - 需要用定制机制而不是标准模块来讲述数据洞察
      - 题目本身适合读者参与、切换视角、逐步探索
    avoid:
      - 儿童化或玩具化
      - 只有 gimmick 没有洞察
